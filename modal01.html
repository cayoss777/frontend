<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .modal {
            display: none;
            /* oculto */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .contenido {
            background: white;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div id="modal" class="modal">
        <div class="contenido">
            <p style="color: red;">Hola, soy un modal</p>
        </div>
    </div>

    <script>
        //Busca en el HTML el elemento con id="modal" y lo guarda en la variable modal.
        const modal = document.getElementById("modal");

        // Cambia el estilo del modal para que se muestre en pantalla.
        modal.style.display = "flex";
    </script>
</body>

</html>
