    .glow-text:hover {

    .float-text {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .btn-interactive {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .btn-interactive::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.15);
      transform: translateX(-100%) skewX(-15deg);
      transition: transform 0.5s ease;
    }

    .btn-interactive:hover::after {
      transform: translateX(100%) skewX(-15deg);
    }

    .btn-interactive:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    }

    .reveal-text {
      opacity: 0;
      transform: translateY(30px);
      animation: revealUp 0.8s ease forwards;
    }

    .reveal-text:nth-child(1) { animation-delay: 0.2s; }
    .reveal-text:nth-child(2) { animation-delay: 0.4s; }

    @keyframes revealUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .letter-spin {
      display: inline-block;
      transition: transform 0.3s ease, color 0.3s ease;
    }

    .letter-spin:hover {
      transform: rotate(10deg) scale(1.1);
      color: #fbbf24;
    }

    .pulse-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #60a5fa;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
    }

    .typing-cursor {
      display: inline-block;
      width: 3px;
      height: 1.2em;
      background: #fbbf24;
      margin-left: 2px;
      animation: cursorBlink 0.7s infinite;
      vertical-align: text-bottom;
    }

    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .visit-counter {

    }

        transform: translateX(-50%);

  <script>
    const html = document.documentElement;
    const switches = [document.getElementById("theme-switch"), document.getElementById("theme-switch-mobile")];

    function applyTheme(isDark) {
      if (isDark) { html.classList.add("dark"); localStorage.setItem("theme", "dark"); }
      else { html.classList.remove("dark"); localStorage.setItem("theme", "light"); }
    }

    const savedTheme = localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    applyTheme(savedTheme === "dark");

    switches.forEach(sw => {
      sw?.addEventListener("click", () => applyTheme(!html.classList.contains("dark")));
    });

    const words = ["Programar", "Big Data", "Ingeniería de datos", "Java", "Tailwind CSS", "Desarrollar webs"];
    let i = 0, j = 0, isDeleting = false;
    const target = document.getElementById("typed");

    function type() {
      const currentWord = words[i];
      target.textContent = isDeleting ? currentWord.substring(0, j--) : currentWord.substring(0, j++);

      if (!isDeleting && j >= currentWord.length) { isDeleting = true; setTimeout(type, 1800); }
      else if (isDeleting && j === 0) { isDeleting = false; i = (i + 1) % words.length; setTimeout(type, 500); }
      else { setTimeout(type, isDeleting ? 40 : 90); }
    }
    type();

    document.querySelectorAll('.btn-interactive').forEach(btn => {
      btn.addEventListener('mousemove', (e) => {
        const rect = btn.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        btn.style.setProperty('--x', x + 'px');
        btn.style.setProperty('--y', y + 'px');
      });
    });

    function animateValue(obj, start, end, duration) {
      let startTimestamp = null;
      const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString();
        if (progress < 1) window.requestAnimationFrame(step);
      };
      window.requestAnimationFrame(step);
    }

    function contadorVisitas() {
      const nombreUnico = "colegio-jose-sepulveda-2026";
      fetch(`https://api.countapi.xyz/hit/${nombreUnico}/visitas`)
        .then(res => res.json())
        .then(res => {
          const elemento = document.getElementById('visitCount');
          animateValue(elemento, 0, res.value, 1200);
        })
        .catch(err => {
          console.error("No se pudo cargar el contador", err);
          document.getElementById('visitCount').innerHTML = "1,050";
        });
    }

    window.addEventListener('DOMContentLoaded', contadorVisitas);

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        const href = this.getAttribute('href');
        if (href === "#") return;
        e.preventDefault();
        document.querySelector(href)?.scrollIntoView({ behavior: 'smooth' });
      });
    });
  </script>
